<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

form{
background:#1b1b1b;
padding:20px;
width:350px;
margin:auto;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
background:#333;
color:white;
}

button{
padding:10px 20px;
background:#00c3ff;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

table{
margin:auto;
margin-top:30px;
width:70%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

th{
background:#1b1b1b;
}

a{
color:red;
}

</style>

</head>

<body>

<h1>Admin Spare Parts Dashboard</h1>

<form action="/admin/save" method="post">

<h3>Add Spare Part</h3>

<input type="text" name="name" placeholder="Part Name">

<input type="number" name="price" placeholder="Price">

<input type="number" name="quantity" placeholder="Quantity">

<button type="submit">Add Part</button>

</form>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Quantity</th>
<th>Delete</th>
</tr>

<tr th:each="p : ${parts}">

<td th:text="${p.id}"></td>
<td th:text="${p.name}"></td>
<td th:text="${p.price}"></td>
<td th:text="${p.quantity}"></td>

<td>
<a th:href="@{/admin/delete/{id}(id=${p.id})}">Delete</a>
</td>

</tr>

</table>

</body>
</html>
